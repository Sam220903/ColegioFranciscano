<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colegio Franciscano</title>
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/general.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="nav-placeholder"></div>

  <div id="hero">
    <img src="assets/images/IMG_6454.JPG" alt="Colegio Franciscano">
  </div>

  <div id="announcements">
    <div class="title">
      <i class="fa-solid fa-bullhorn"></i>
      <h2>Avisos</h2>
    </div>

    <div class="announcements-body">

      <!-- Carrusel + dots envueltos juntos -->
      <div class="carousel-wrapper">
        <div class="carousel" id="carousel">
          <div class="carousel-track" id="carousel-track">
            <div class="carousel-slide">
              <img src="assets/images/test1.jpg" alt="">
            </div>
            <div class="carousel-slide">
              <img src="assets/images/test2.jpg" alt="">
            </div>
            <div class="carousel-slide">
              <img src="assets/images/test3.jpg" alt="">
            </div>
          </div>
          <button class="carousel-btn prev" id="carousel-prev">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <button class="carousel-btn next" id="carousel-next">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
        <div class="carousel-dots" id="carousel-dots"></div>
      </div>

      <!-- Tarjetas de avisos -->
      <div class="announcement-cards" id="announcement-cards"></div>

    </div>

    <div class="announcements-footer">
      <a href="./avisos.html" class="btn-all-announcements">
        Consulta todos los avisos recientes
        <i class="fa-solid fa-arrow-up-right-from-square"></i>
      </a>
    </div>
  </div>

  <div id="footer-placeholder"></div>
</body>
<script src="assets/js/main.js"></script>
<script src="assets/js/index.js"></script>
</html>
