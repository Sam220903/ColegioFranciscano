<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colegio Franciscano</title>
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav id="main-nav">
    <a href="">Sobre nosotros</a>
    <a href="">Avisos</a>
    <a href="">Servicios</a>  
    <img id="cf-logo" src="assets/images/logo.png" alt="Logo Colegio Franciscano">
    <a href="">Alianzas</a>
    <a href="">Contacto</a>
    <a href="">Más acciones</a>
  </nav>

  <div id="hero">
    <img src="assets/images/bg.JPG" alt="Colegio Franciscano">
  </div>

  <div id="announcements">

    <div class="title">
      <i class="fa-solid fa-bullhorn"></i>
      <h2>Avisos</h2>
    </div>

    <div class="announcements-body">

      <!-- Carrusel -->
      <div class="carousel" id="carousel">
        <div class="carousel-track" id="carousel-track">
          <!-- Agrega aquí tus slides; por ahora placeholders -->
          <div class="carousel-slide placeholder">
            <img src="assets/images/test1.jpg" alt="">
          </div>
          <div class="carousel-slide placeholder" style="background: linear-gradient(135deg, #2e5fa3 0%, #4a7fcb 100%);">
            <img src="assets/images/test2.jpg" alt="">
          </div>
          <div class="carousel-slide placeholder" style="background: linear-gradient(135deg, #0a2240 0%, #1a3a6b 100%);">
            <img src="assets/images/test3.jpg" alt="">
          </div>
        </div>

        <button class="carousel-btn prev" id="carousel-prev">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button class="carousel-btn next" id="carousel-next">
          <i class="fa-solid fa-chevron-right"></i>
        </button>

        <div class="carousel-dots" id="carousel-dots"></div>
      </div>

      <!-- Tarjetas de avisos -->
      <div class="announcement-cards" id="announcement-cards">
        <!-- Se generan con JS; también puedes escribirlas a mano -->
      </div>

    </div>

    <div class="announcements-footer">
      <a href="" class="btn-all-announcements">
        Consulta todos los avisos recientes
        <i class="fa-solid fa-arrow-up-right-from-square"></i>
      </a>
    </div>

  </div>

  <footer>

    <div class="footer-container">
        <div class="footer-panel" id="school-name">
          <div id="logo-container">
              <img src="assets/images/logo.png" alt="Logo Colegio Franciscano">
          </div>
          <div id="name-container">
              <h1>Colegio Franciscano AC</h1>
              <h4>de Huamantla, Tlax.</h4>
          </div>
      </div>

      <div class="footer-panel" id="school-info">
          <div class="data-label">
              <i class="fa-solid fa-location-dot"></i>
              <span>Allende Sur #103, Huamantla, Tlaxcala</span>
          </div>
          <div class="data-label">
              <i class="fa-solid fa-phone"></i>
              <span>247 472 0756</span>
          </div>
          <div class="data-label">
              <i class="fa-solid fa-envelope"></i>
              <span>colegiofranciscano.a.c@gmail.com</span>
          </div>
          <div class="data-label" id="facebook-link">
              <i class="fa-brands fa-facebook"></i>
              <a href="https://www.facebook.com/ColegioFranciscanoAC/" target="_blank">Colegio Franciscano AC de Huamantla, Tlax.</span>
          </div>
      </div>
    </div>

  </footer>


</body>

<script src="assets/js/main.js"></script>

</html>
