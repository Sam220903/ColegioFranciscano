<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colegio Franciscano</title>
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <link rel="stylesheet" href="assets/css/notices.css">
  <link rel="stylesheet" href="assets/css/general.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="nav-placeholder"></div>

  <div id="banner">
    <div class="content">
      <img id="main-notice-img" src="" alt="">
      <div id="banner-info">
        <span id="main-notice-title"></span>
        <a id="main-notice-link" href="#">
          Más información
          <i class="fa-solid fa-arrow-right"></i>
        </a>
      </div>
    </div>
  </div>

  <div id="announcements">
    <div class="title">
      <i class="fa-solid fa-bullhorn"></i>
      <h2>Últimas noticias y avisos</h2>
    </div>

    <!-- Carrusel de 3 cartas -->
    <div class="cards-carousel-wrapper">
      <button class="cards-btn prev" id="cards-prev">
        <i class="fa-solid fa-chevron-left"></i>
      </button>

      <div class="cards-viewport">
        <div class="cards-track" id="cards-track">
          <!-- Las tarjetas se generan con JS -->
        </div>
      </div>

      <button class="cards-btn next" id="cards-next">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>

    <!-- Dots -->
    <div class="cards-dots" id="cards-dots"></div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="assets/js/main.js"></script>
  <script type="module" src="assets/js/notices.js"></script>
</body>
</html>
